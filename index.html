<script>
// Typing effect
const text="Data Analyst | Python | SQL | Power BI | Excel";
let i=0;
function type(){if(i<text.length){document.getElementById("typing").innerHTML+=text.charAt(i);i++;setTimeout(type,70)}}
type();

// Scroll animation
const cards=document.querySelectorAll('.card');
window.addEventListener('scroll',()=>{
cards.forEach(card=>{
const top=card.getBoundingClientRect().top;
if(top<window.innerHeight-50){card.classList.add('show');}
})
});

// Fake contact form (frontend demo)
function sendMessage(e){
e.preventDefault();
document.getElementById("successMsg").innerText="Message sent successfully!";
}
</script>
